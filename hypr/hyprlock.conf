### hyprlock
## source: github.com/catppuccin/hyprlock
source = ~/.config/hypr/colors.conf
$wallpaper = ~/Pictures/backgrounds
$accent = $blue
$accentAlpha = $blueAlpha
$font = Maple Mono Regular

# General
general {
    hide_cursor = true
    immediate_render = true
    ignore_empty_input = true
}

# Backgrounds
background {
    monitor = eDP-1
    path = $wallpaper/cat-leaves_blurred.png
    blur_passes = 0
    color = $base
}
background {
    monitor = HDMI-A-1
    path = $wallpaper/tux-wall_blurred.png
    blur_passes = 0
    color = $base
}

# Layout
label {
    monitor = eDP-1
    text = Layout: $LAYOUT
    color = $text
    font_size = 25
    font_family = $font
    position = 30, -30
    halign = left
    valign = top
}

# Time
label {
    monitor = eDP-1
    text = $TIME
    color = $text
    font_size = 90
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# Date
label {
    monitor = eDP-1
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $text
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

# Fingerprint
{
    monitor = eDP-1
    text = $FPRINTPROMPT
    color = $text
    font_size = 14
    font_family = $font
    position = 0, -107
    halign = center
    valign = center
}

# User Avatar
image {
    monitor = eDP-1
    path = ~/.face
    size = 100
    border_color = $accent
    position = 0, 75
    halign = center
    valign = center
}

# Input field
input-field {
    monitor = eDP-1
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $surface0
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
    hide_input = false
    check_color = $accent
    fail_color = $red
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = $yellow
    position = 0, -47
    halign = center
    valign = center
}
